<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --blush:        #f7ddd8;
    --blush-deep:   #edb8ae;
    --rose:         #c9736a;
    --rose-dark:    #a8524a;
    --petal:        #fdf0ee;
    --petal-dark:   #f9e4e0;
    --text-dark:    #2b1a18;
    --text-mid:     #7a4a44;
    --text-soft:    #b07a74;
    --white:        #fffaf9;
    --gold:         #d4a96a;
  }
 
  html, body {
    min-height: 100%;
    background: var(--petal);
    font-family: 'Jost', sans-serif;
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
  }
 
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 10% 0%, rgba(237,184,174,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 90% 100%, rgba(201,115,106,0.15) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(247,221,216,0.2) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
 
  .page {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 56px;
    gap: 0;
  }
 
  .petal-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.1s forwards;
  }
  .petal {
    width: 8px; height: 14px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: var(--blush-deep);
    transform-origin: bottom center;
  }
  .petal:nth-child(1){ transform: rotate(-35deg); background: var(--rose); opacity: 0.5; }
  .petal:nth-child(2){ transform: rotate(-15deg); background: var(--blush-deep); opacity: 0.7; }
  .petal:nth-child(3){ transform: rotate(0deg); background: var(--rose); opacity: 0.9; }
  .petal:nth-child(4){ transform: rotate(15deg); background: var(--blush-deep); opacity: 0.7; }
  .petal:nth-child(5){ transform: rotate(35deg); background: var(--rose); opacity: 0.5; }
 
  .brand {
    text-align: center;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.2s forwards;
  }
  .brand-eyebrow {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 6px;
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--text-dark);
    line-height: 1;
    position: relative;
    display: inline-block;
  }
  .brand-name::after {
    content: '';
    display: block;
    width: 60%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--blush-deep), transparent);
    margin: 8px auto 0;
  }
  .brand-sub {
    font-size: 11.5px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--text-soft);
    margin-top: 8px;
  }
 
  .stars-wrap {
    text-align: center;
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.35s forwards;
  }
  .stars {
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--gold);
    filter: drop-shadow(0 1px 3px rgba(212,169,106,0.4));
  }
  .stars-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-top: 5px;
    font-weight: 500;
  }
 
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--white);
    border: 1px solid rgba(237,184,174,0.6);
    border-radius: 24px;
    padding: 28px 24px 24px;
    box-shadow:
      0 2px 0px rgba(201,115,106,0.08),
      0 8px 32px rgba(180,80,70,0.09),
      inset 0 1px 0 rgba(255,255,255,0.9);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.45s forwards;
  }
  .card::before {
    content: '✿';
    position: absolute;
    top: 12px; right: 16px;
    font-size: 18px;
    color: var(--blush-deep);
    opacity: 0.5;
    line-height: 1;
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blush), var(--rose), var(--blush-deep), var(--blush));
    border-radius: 24px 24px 0 0;
  }
 
  .card-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::before,
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blush-deep));
  }
  .card-label::after {
    background: linear-gradient(90deg, var(--blush-deep), transparent);
  }
 
  .review-text {
    font-family: 'Jost', sans-serif;
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.8;
    color: var(--text-dark);
    min-height: 80px;
    word-break: break-word;
    transition: opacity 0.18s ease;
  }
  .review-text.fade { opacity: 0; }
 
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blush-deep), transparent);
    margin: 20px 0;
  }
 
  .btn-row { display: flex; gap: 10px; }
 
  .btn-cta {
    flex: 1;
    padding: 16px 18px;
    background: linear-gradient(135deg, var(--rose) 0%, var(--rose-dark) 100%);
    color: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.22s ease;
    box-shadow: 0 4px 16px rgba(168,82,74,0.35);
    position: relative;
    overflow: hidden;
  }
  .btn-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    border-radius: 14px;
  }
  .btn-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(168,82,74,0.4); }
  .btn-cta:active { transform: scale(0.97); }
  .btn-cta.success {
    background: linear-gradient(135deg, #6aab78 0%, #4a8a58 100%);
    box-shadow: 0 4px 16px rgba(74,138,88,0.35);
  }
 
  .btn-refresh {
    flex: 0 0 52px;
    padding: 16px;
    background: var(--petal-dark);
    color: var(--rose);
    border: 1px solid rgba(237,184,174,0.6);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-refresh:hover { background: var(--blush); color: var(--rose-dark); }
  .btn-refresh:active { transform: scale(0.97); }
  .btn-refresh svg { transition: transform 0.44s cubic-bezier(.4,2,.55,.9); }
  .btn-refresh.spinning svg { transform: rotate(360deg); }
 
  .hint {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-soft);
    margin-top: 16px;
    font-weight: 400;
    letter-spacing: 0.03em;
    min-height: 18px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.6s forwards;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>

  "Everything from the consultation to the last session reflects the highest standard of professional care.",
  "My skin has never been in better health and Bella Rosa deserves full credit for that transformation.",
  "The trust I have built here over months is the reason I will never look for another skincare clinic.",
  "The kind of personalized attention Albina ma'am gives makes you feel like the only client that matters.",
  "This is the skincare experience everyone deserves but very few clinics in Varanasi actually provide.",
  "Bella Rosa has earned five stars and then some with the consistent quality they deliver every single visit.",
  "The complete package of skill, warmth, cleanliness, and results makes Bella Rosa genuinely irreplaceable."
];

var _s = Date.now();
function rnd(){ _s=(_s*1664525+1013904223)&0xffffffff; return((_s>>>0)/4294967295); }
function pick(a){ return a[Math.floor(rnd()*a.length)]; }

var buf = [];
var BUF_MAX = 18;
function addBuf(t){ buf.push(t); if(buf.length>BUF_MAX) buf.shift(); }
function inBuf(t){
  return buf.some(function(b){
    var wa=new Set(b.toLowerCase().split(/\s+/).slice(0,12));
    var wb=new Set(t.toLowerCase().split(/\s+/).slice(0,12));
    var c=0; wa.forEach(function(w){ if(wb.has(w)) c++; });
    return c/Math.max(wa.size,wb.size,1)>0.45;
  });
}

var reviewCount = 0;
function useErrors(){ reviewCount++; return (reviewCount % 3 === 0); }

function compose(){
  var errs = useErrors();
  var style = Math.floor(rnd()*14);

  if(style===0){
    var op = errs ? pick(ERR_OPENERS) : pick(VISIT_OPENERS);
    var tr = pick(TREATMENT_OBSERVATIONS);
    var re = errs ? pick(ERR_RESULTS) : pick(RESULTS_OBSERVATIONS);
    var cl = errs ? pick(ERR_CLOSE) : pick(CLOSING_RECS);
    return op+". "+tr+". "+re+". "+cl;
  }
  if(style===1){
    var op = errs ? pick(ERR_OPENERS) : pick(VISIT_OPENERS);
    var st = pick(STAFF_OBSERVATIONS);
    var tr = pick(TRUST_AUTHENTICITY_LINES);
    var cl = errs ? pick(ERR_CLOSE) : pick(CLOSING_RECS);
    return op+". "+st+". "+tr+". "+cl;
  }
  if(style===2){
    var op = errs ? pick(ERR_OPENERS) : pick(VISIT_OPENERS);
    var hy = pick(HYGIENE_AMBIENCE);
    var re = errs ? pick(ERR_RESULTS) : pick(RESULTS_OBSERVATIONS);
    var cl = errs ? pick(ERR_CLOSE) : pick(CLOSING_RECS);
    return op+". "+hy+". "+re+". "+cl;
  }
  if(style===3){
    var op = errs ? pick(ERR_OPENERS) : pick(VISIT_OPENERS);
    var pc = pick(PERSONALIZED_CARE_LINES);
    var re = errs ? pick(ERR_RESULTS) : pick(RESULTS_OBSERVATIONS);
    var cl = errs ? pick(ERR_CLOSE) : pick(CLOSING_RECS);
    return op+". "+pc+". "+re+". "+cl;
  }
  if(style===4){
    var op = errs ? pick(ERR_OPENERS) : pick(VISIT_OPENERS);
    var hc = pick(HAIR_CARE_LINES);
    var st = pick(STAFF_OBSERVATIONS);
    var cl = errs ? pick(ERR_CLOSE) : pick(CLOSING_RECS);
    return op+". "+hc+". "+st+". "+cl;
  }
  if(style===5){
    var op = errs ? pick(ERR_OPENERS) : pick(VISIT_OPENERS);
    var hy = pick(HYGIENE_AMBIENCE);
    var st = pick(STAFF_OBSERVATIONS);
    var cl = errs ? pick(ERR_CLOSE) : pick(CLOSING_RECS);
    return op+". "+hy+". "+st+". "+cl;
  }
  if(style===6){ return pick(ONE_LINERS_EN); }
  if(style===7){ return pick(ONE_LINERS_HI); }
  if(style===8){ return pick(TWO_PART_A)+" "+pick(TWO_PART_B); }
  if(style===9){
    var op = pick(HI_OPENERS);
    var tr = pick(HI_TREATMENT);
    var re = pick(HI_RESULTS);
    var cl = pick(HI_CLOSE);
    return op+". "+tr+". "+re+". "+cl;
  }
  if(style===10){
    var op = pick(HI_OPENERS);
    var st = pick(HI_STAFF);
    var hy = pick(HI_HYGIENE);
    var cl = pick(HI_CLOSE);
    return op+". "+st+". "+hy+". "+cl;
  }
  if(style===11){
    var lines = [
      "Best skincare clinic in Varanasi. "+pick(TREATMENT_OBSERVATIONS)+". "+pick(CLOSING_RECS),
      "Bella Rosa is in a league of its own for skincare in Varanasi. "+pick(TRUST_AUTHENTICITY_LINES)+". "+pick(CLOSING_RECS),
      pick(VISIT_OPENERS)+". "+pick(TRUST_AUTHENTICITY_LINES)+". "+pick(CLOSING_RECS),
      pick(STAFF_OBSERVATIONS)+". "+pick(RESULTS_OBSERVATIONS)+". "+pick(CLOSING_RECS),
      pick(PERSONALIZED_CARE_LINES)+". "+pick(TRUST_AUTHENTICITY_LINES)+". "+pick(CLOSING_RECS),
      "Genuine treatments, advanced technology, and staff that truly cares. "+pick(CLOSING_RECS),
      pick(HYGIENE_AMBIENCE)+". "+pick(RESULTS_OBSERVATIONS)+". "+pick(CLOSING_RECS),
      pick(TREATMENT_OBSERVATIONS)+". "+pick(STAFF_OBSERVATIONS)+". "+pick(CLOSING_RECS)
    ];
    return pick(lines);
  }
  if(style===12){
    var op = errs ? pick(ERR_OPENERS) : pick(VISIT_OPENERS);
    var tr = pick(TREATMENT_OBSERVATIONS);
    var st = pick(STAFF_OBSERVATIONS);
    var pc = pick(PERSONALIZED_CARE_LINES);
    var cl = errs ? pick(ERR_CLOSE) : pick(CLOSING_RECS);
    return op+". "+tr+". "+st+". "+pc+". "+cl;
  }
  var tr = pick(TRUST_AUTHENTICITY_LINES);
  var st = pick(STAFF_OBSERVATIONS);
  var re = errs ? pick(ERR_RESULTS) : pick(RESULTS_OBSERVATIONS);
  var cl = errs ? pick(ERR_CLOSE) : pick(CLOSING_RECS);
  return tr+". "+st+". "+re+". "+cl;
}

function buildReview(){
  _s = Date.now() ^ (Math.random()*0x7fffffff|0);
  var v, n=0;
  do { v=compose(); n++; } while(inBuf(v) && n<30);
  addBuf(v);
  return v;
}

var currentReview = "";

function displayReview(anim){
  var el = document.getElementById("reviewText");
  if(anim){
    el.classList.add("fade");
    setTimeout(function(){
      currentReview = buildReview();
      el.textContent = currentReview;
      el.classList.remove("fade");
    },180);
  } else {
    currentReview = buildReview();
    el.textContent = currentReview;
  }
}

function refreshReview(){
  var btn = document.getElementById("btnRefresh");
  btn.classList.add("spinning");
  displayReview(true);
  setTimeout(function(){ btn.classList.remove("spinning"); },440);
  var cb = document.getElementById("btnCopy");
  cb.textContent = "Copy & Post on Google";
  cb.classList.remove("success");
  document.getElementById("hint").textContent = "Tap to copy your review, then paste it on Google.";
}

function copyAndGo(){
  var btn = document.getElementById("btnCopy");
  function afterCopy(){
    btn.textContent = "Copied! Opening Google… ✓";
    btn.classList.add("success");
    document.getElementById("hint").textContent = "Paste it in the review box on Google. 🌸";
    setTimeout(function(){ window.open(reviewLink,"_blank"); },900);
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(currentReview).then(afterCopy).catch(fallback);
  } else { fallback(); }
  function fallback(){
    var ta=document.createElement("textarea");
    ta.value=currentReview;
    ta.setAttribute("readonly","");
    ta.style.cssText="position:fixed;top:0;left:0;opacity:0;pointer-events:none;";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    document.body.removeChild(ta);
    afterCopy();
  }
}

window.addEventListener("DOMContentLoaded",function(){ displayReview(false); });
</script>
