<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --blush:        #f7ddd8;
    --blush-deep:   #edb8ae;
    --rose:         #c9736a;
    --rose-dark:    #a8524a;
    --petal:        #fdf0ee;
    --petal-dark:   #f9e4e0;
    --text-dark:    #2b1a18;
    --text-mid:     #7a4a44;
    --text-soft:    #b07a74;
    --white:        #fffaf9;
    --gold:         #d4a96a;
  }
 
  html, body {
    min-height: 100%;
    background: var(--petal);
    font-family: 'Jost', sans-serif;
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
  }
 
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 10% 0%, rgba(237,184,174,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 90% 100%, rgba(201,115,106,0.15) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(247,221,216,0.2) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
 
  .page {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 56px;
    gap: 0;
  }
 
  .petal-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.1s forwards;
  }
  .petal {
    width: 8px; height: 14px;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: var(--blush-deep);
    transform-origin: bottom center;
  }
  .petal:nth-child(1){ transform: rotate(-35deg); background: var(--rose); opacity: 0.5; }
  .petal:nth-child(2){ transform: rotate(-15deg); background: var(--blush-deep); opacity: 0.7; }
  .petal:nth-child(3){ transform: rotate(0deg); background: var(--rose); opacity: 0.9; }
  .petal:nth-child(4){ transform: rotate(15deg); background: var(--blush-deep); opacity: 0.7; }
  .petal:nth-child(5){ transform: rotate(35deg); background: var(--rose); opacity: 0.5; }
 
  .brand {
    text-align: center;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.2s forwards;
  }
  .brand-eyebrow {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 6px;
  }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--text-dark);
    line-height: 1;
    position: relative;
    display: inline-block;
  }
  .brand-name::after {
    content: '';
    display: block;
    width: 60%;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--blush-deep), transparent);
    margin: 8px auto 0;
  }
  .brand-sub {
    font-size: 11.5px;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--text-soft);
    margin-top: 8px;
  }
 
  .stars-wrap {
    text-align: center;
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.35s forwards;
  }
  .stars {
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--gold);
    filter: drop-shadow(0 1px 3px rgba(212,169,106,0.4));
  }
  .stars-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-top: 5px;
    font-weight: 500;
  }
 
  .card {
    width: 100%;
    max-width: 440px;
    background: var(--white);
    border: 1px solid rgba(237,184,174,0.6);
    border-radius: 24px;
    padding: 28px 24px 24px;
    box-shadow:
      0 2px 0px rgba(201,115,106,0.08),
      0 8px 32px rgba(180,80,70,0.09),
      inset 0 1px 0 rgba(255,255,255,0.9);
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.45s forwards;
  }
  .card::before {
    content: '✿';
    position: absolute;
    top: 12px; right: 16px;
    font-size: 18px;
    color: var(--blush-deep);
    opacity: 0.5;
    line-height: 1;
  }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blush), var(--rose), var(--blush-deep), var(--blush));
    border-radius: 24px 24px 0 0;
  }
 
  .card-label {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::before,
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blush-deep));
  }
  .card-label::after {
    background: linear-gradient(90deg, var(--blush-deep), transparent);
  }
 
  .review-text {
    font-family: 'Jost', sans-serif;
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.8;
    color: var(--text-dark);
    min-height: 80px;
    word-break: break-word;
    transition: opacity 0.18s ease;
  }
  .review-text.fade { opacity: 0; }
 
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--blush-deep), transparent);
    margin: 20px 0;
  }
 
  .btn-row { display: flex; gap: 10px; }
 
  .btn-cta {
    flex: 1;
    padding: 16px 18px;
    background: linear-gradient(135deg, var(--rose) 0%, var(--rose-dark) 100%);
    color: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.22s ease;
    box-shadow: 0 4px 16px rgba(168,82,74,0.35);
    position: relative;
    overflow: hidden;
  }
  .btn-cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    border-radius: 14px;
  }
  .btn-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(168,82,74,0.4); }
  .btn-cta:active { transform: scale(0.97); }
  .btn-cta.success {
    background: linear-gradient(135deg, #6aab78 0%, #4a8a58 100%);
    box-shadow: 0 4px 16px rgba(74,138,88,0.35);
  }
 
  .btn-refresh {
    flex: 0 0 52px;
    padding: 16px;
    background: var(--petal-dark);
    color: var(--rose);
    border: 1px solid rgba(237,184,174,0.6);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.22s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-refresh:hover { background: var(--blush); color: var(--rose-dark); }
  .btn-refresh:active { transform: scale(0.97); }
  .btn-refresh svg { transition: transform 0.44s cubic-bezier(.4,2,.55,.9); }
  .btn-refresh.spinning svg { transform: rotate(360deg); }
 
  .hint {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-soft);
    margin-top: 16px;
    font-weight: 400;
    letter-spacing: 0.03em;
    min-height: 18px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.6s forwards;

  .footer-tag {
    margin-top: 28px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-soft);
    opacity: 0;
    animation: fadeUp 0.7s ease 0.75s forwards;
    letter-spacing: 0.04em;
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
